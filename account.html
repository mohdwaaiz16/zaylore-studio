<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="Access your premium ZAYLORE Studio member account. View exclusive drops, track streetwear orders, and manage creator community membership.">
    <link rel="canonical" href="https://www.zaylorestudio.in/account">
    <link rel="icon" href="img/logo-icon-sm.webp" type="image/webp">

    <!-- Breadcrumb Schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "BreadcrumbList",
      "itemListElement": [
        {

        },
        {
          "@type": "ListItem",
          "position": 2,

          "item": "https://www.zaylorestudio.in/account"
        }
      ]

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"></noscript>
    <link rel="stylesheet" href="/styles.min.css?v=1.2.0">

    <!-- Google Sign-In SDK -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <!-- Firebase SDK (compat v9 — works without bundler) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <style>
        /* ═══════════════════════════════════════════════
           ACCOUNT PAGE — PREMIUM LOGIN SYSTEM
        ═══════════════════════════════════════════════ */

        .account-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 110px 20px 60px;
            position: relative;
        }

        /* Animated background radial glow */
        .account-page::before {
            content: '';
            position: fixed;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(212,25,32,0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
            animation: glowPulse 4s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% { opacity: 0.6; transform: translateX(-50%) scale(1); }
            50% { opacity: 1; transform: translateX(-50%) scale(1.1); }
        }

        .auth-container {
            width: 100%;
            max-width: 460px;
            background: rgba(10, 10, 10, 0.92);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(212, 25, 32, 0.18);
            border-radius: 20px;
            padding: 44px 40px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.8), 0 0 40px rgba(212,25,32,0.06);
            z-index: 2;
            position: relative;
            overflow: hidden;
            animation: containerEntrance 0.6s cubic-bezier(0.23,1,0.32,1) forwards;
        }

        @keyframes containerEntrance {
            from { opacity: 0; transform: translateY(32px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Top accent bar */
        .auth-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 3px;
            background: linear-gradient(90deg, transparent, #d41920 30%, #ff4a4a 50%, #d41920 70%, transparent);
        }

        /* Logo & Header */
        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .auth-logo-wrap {
            width: 72px;
            height: 72px;
            border-radius: 16px;
            margin: 0 auto 18px;
            border: 1.5px solid rgba(212,25,32,0.35);
            box-shadow: 0 0 30px rgba(212,25,32,0.2), 0 8px 24px rgba(0,0,0,0.5);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(15,15,15,0.9);
            position: relative;
        }

        .auth-logo-wrap::after {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 18px;
            border: 2px solid transparent;
            background: linear-gradient(135deg, rgba(212,25,32,0.4), transparent, rgba(212,25,32,0.2)) border-box;
            -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: destination-out;
            mask-composite: exclude;
            pointer-events: none;
        }

        .auth-logo {
            width: 54px;
            height: 54px;
            object-fit: contain;
        }

        .auth-title {
            font-family: 'Anton', sans-serif;
            font-size: 2rem;
            color: #fff;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 6px;
            line-height: 1;
        }

        .auth-subtitle {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.82rem;
            color: #666;
            letter-spacing: 1px;
        }

        /* Tabs */
        .auth-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 28px;
            border-radius: 8px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            overflow: hidden;
        }

        .auth-tab {
            flex: 1;
            background: none;
            border: none;
            padding: 12px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.78rem;
            font-weight: 700;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .auth-tab.active {
            background: rgba(212,25,32,0.1);
            color: #d41920;
            box-shadow: inset 0 0 15px rgba(212,25,32,0.05);
        }

        /* Forms */
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 7px;
        }

        .form-label {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.72rem;
            font-weight: 700;
            color: #999;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .input-wrap {
            position: relative;
        }

        .form-input {
            width: 100%;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            padding: 13px 16px;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 0.92rem;
            transition: all 0.25s ease;
            box-sizing: border-box;
        }

        .form-input:focus {
            outline: none;
            border-color: #d41920;
            background: rgba(212,25,32,0.04);
            box-shadow: 0 0 0 3px rgba(212,25,32,0.08);
        }

        .form-input.valid {
            border-color: rgba(0,200,100,0.4);
        }

        .form-input::placeholder { color: #333; }

        .pass-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #444;
            padding: 0;
            display: flex;
            align-items: center;
            transition: color 0.2s;
        }
        .pass-toggle:hover { color: #888; }
        .pass-toggle svg { width: 18px; height: 18px; }

        /* Password strength */
        .pass-strength {
            display: flex;
            gap: 4px;
            margin-top: 4px;
        }
        .strength-bar {
            flex: 1;
            height: 3px;
            border-radius: 2px;
            background: rgba(255,255,255,0.08);
            transition: background 0.3s;
        }
        .strength-bar.weak   { background: #d41920; }
        .strength-bar.medium { background: #ff8c00; }
        .strength-bar.strong { background: #00c864; }

        .pass-strength-label {
            font-size: 0.68rem;
            color: #555;
            font-family: 'Space Grotesk', sans-serif;
            margin-top: 3px;
        }

        .forgot-password {
            align-self: flex-end;
            font-family: 'Inter', sans-serif;
            font-size: 0.78rem;
            color: #555;
            text-decoration: none;
            transition: color 0.2s;
        }
        .forgot-password:hover { color: #d41920; }

        /* Submit button */
        .auth-btn {
            background: linear-gradient(135deg, #d41920, #b31218);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 15px;
            font-family: 'Anton', sans-serif;
            font-size: 1rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(212,25,32,0.35);
            margin-top: 4px;
            position: relative;
            overflow: hidden;
        }

        .auth-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.12), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(212,25,32,0.5);
        }
        .auth-btn:hover::after { opacity: 1; }
        .auth-btn:active { transform: translateY(0); }

        .auth-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 14px;
            color: #333;
            font-size: 0.68rem;
            font-family: 'Space Grotesk', sans-serif;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: 4px 0;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.06);
        }

        /* Google button */
        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 13px 16px;
            color: #ccc;
            font-family: 'Inter', sans-serif;
            font-size: 0.88rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s ease;
            width: 100%;
        }
        .google-btn:hover {
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.2);
            color: #fff;
            transform: translateY(-1px);
        }
        .google-btn svg { flex-shrink: 0; }

        /* Admin toggle */
        .admin-toggle {
            text-align: center;
            margin-top: 6px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.72rem;
            color: #444;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .admin-link {
            color: #d41920;
            text-decoration: none;
            cursor: pointer;
            margin-left: 6px;
            transition: color 0.2s;
        }
        .admin-link:hover { color: #fff; }

        /* Toast */
        .auth-toast {
            position: fixed;
            bottom: -120px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10,10,10,0.98);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            padding: 14px 28px;
            border-radius: 10px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.82rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            z-index: 10000;
            transition: bottom 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
            max-width: 90vw;
            text-align: center;
            white-space: nowrap;
        }
        .auth-toast.show   { bottom: 32px; }
        .auth-toast.error  { border-color: #d41920; box-shadow: 0 20px 60px rgba(0,0,0,0.8), 0 0 30px rgba(212,25,32,0.3); }
        .auth-toast.success{ border-color: #00c864; box-shadow: 0 20px 60px rgba(0,0,0,0.8), 0 0 30px rgba(0,200,100,0.25); }

        /* Modal */
        .auth-modal-panel {
            max-width: 380px;
            width: 90vw;
            padding: 32px 28px;
        }
        .modal-title {
            font-family: 'Anton', sans-serif;
            font-size: 1.5rem;
            color: #fff;
            letter-spacing: 2px;
            margin-bottom: 6px;
        }
        .modal-sub {
            font-size: 0.82rem;
            color: #666;
            font-family: 'Inter', sans-serif;
            margin-bottom: 0;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .auth-container { padding: 32px 20px; border-radius: 16px; }
            .auth-title { font-size: 1.7rem; }
        }
    </style>
</head>

<body>
    <!-- Background effects -->
    <canvas id="particles-canvas"></canvas>
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>
    <div class="glow glow-3"></div>

    <!-- Navigation -->
    <nav id="main-nav">
        <div class="nav-container">
            <a href="/" class="nav-logo">
                <img src="img/logo-icon-sm.webp" alt="Zaylore Logo">
                <span class="logo-text">ZAYLORE</span>
            </a>
            <div class="nav-links" id="nav-links">
                <a href="/"        class="nav-link">Home</a>
                <a href="products" class="nav-link">Products</a>
                <a href="creators" class="nav-link">Creators</a>
                <a href="events"   class="nav-link">Events</a>
                <a href="gallery"  class="nav-link">Gallery</a>
                <a href="about"    class="nav-link">About</a>
                <a href="contact"  class="nav-link">Contact</a>
            </div>
            <div class="nav-right">
                <a href="account" class="nav-action mobile-visible nav-account-icon" id="nav-profile-btn" aria-label="Account">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </a>
                <div class="hamburger" id="hamburger">
                    <span></span><span></span><span></span>
                </div>
            </div>
        </div>
    </nav>

    <!-- AUTH CARD -->
    <main class="account-page" id="account-page">
        <div class="auth-container" id="auth-container">

            <!-- Header -->
            <div class="auth-header">
                <div class="auth-logo-wrap">
                    <img src="img/logo-icon-sm.webp" alt="Zaylore" class="auth-logo">
                </div>
                <h1 class="auth-title" id="auth-title">ACCESS GRANTED</h1>
                <p class="auth-subtitle" id="auth-subtitle">Welcome to the Zaylore Syndicate</p>
            </div>

            <!-- Tabs -->
            <div class="auth-tabs" id="auth-tabs">
                <button class="auth-tab active" id="tab-login" onclick="toggleAuth('login')">Sign In</button>
                <button class="auth-tab"         id="tab-join"  onclick="toggleAuth('join')">Join</button>
            </div>

            <!-- ── LOGIN FORM ── -->
            <div id="login-form">
                <form class="auth-form" id="actual-login-form" novalidate>
                    <div class="form-group">
                        <label class="form-label" id="user-label">Email Address</label>
                        <div class="input-wrap">
                            <input type="email" class="form-input" id="user-input"
                                placeholder="name@example.com" autocomplete="email" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <div class="input-wrap">
                            <input type="password" class="form-input" id="pass-input"
                                placeholder="••••••••" autocomplete="current-password" required
                                style="padding-right: 44px;">
                            <button type="button" class="pass-toggle" id="pass-toggle-login" aria-label="Show password">
                                <svg id="eye-icon-login" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                                </svg>
                            </button>
                        </div>
                        <a href="#" class="forgot-password" id="forgot-link">Forgot password?</a>
                    </div>

                    <button type="submit" class="auth-btn" id="auth-submit-btn">Authorize</button>

                    <div class="admin-toggle">
                        <span id="admin-text">Staff member?</span>
                        <a class="admin-link" id="admin-btn" onclick="toggleAdmin()">Admin Login</a>
                    </div>
                </form>

                <!-- Google Sign-In -->
                <div style="margin-top:22px;" id="social-block">
                    <div class="divider">Or continue with</div>
                    <button class="google-btn" id="google-signin-btn" onclick="handleGoogleSignIn()" style="margin-top:14px;">
                        <svg width="20" height="20" viewBox="0 0 48 48">
                            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                            <path fill="none" d="M0 0h48v48H0z"/>
                        </svg>
                        Continue with Google
                    </button>
                </div>
            </div>

            <!-- ── JOIN FORM ── -->
            <div id="join-form" style="display:none;">
                <form class="auth-form" id="actual-join-form" novalidate>
                    <div class="form-group">
                        <label class="form-label">Full Name</label>
                        <input type="text" id="join-name" class="form-input"
                            placeholder="Your full name" autocomplete="name" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <input type="email" id="join-email" class="form-input"
                            placeholder="name@example.com" autocomplete="email" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Create Password</label>
                        <div class="input-wrap">
                            <input type="password" id="join-password" class="form-input"
                                placeholder="••••••••" minlength="6" required
                                autocomplete="new-password" style="padding-right: 44px;">
                            <button type="button" class="pass-toggle" id="pass-toggle-join" aria-label="Show password">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                                </svg>
                            </button>
                        </div>
                        <!-- Password strength indicator -->
                        <div class="pass-strength" id="pass-strength-bars">
                            <div class="strength-bar" id="sb1"></div>
                            <div class="strength-bar" id="sb2"></div>
                            <div class="strength-bar" id="sb3"></div>
                            <div class="strength-bar" id="sb4"></div>
                        </div>
                        <span class="pass-strength-label" id="pass-strength-label"></span>
                    </div>

                    <button type="submit" class="auth-btn">Initialize Account</button>

                    <div class="admin-toggle">
                        <span>Want to work with us?</span>
                        <a class="admin-link" onclick="toggleStaffForm(true)">Apply as Staff</a>
                    </div>
                </form>

                <div style="margin-top:22px;">
                    <div class="divider">Or continue with</div>
                    <button class="google-btn" onclick="handleGoogleSignIn()" style="margin-top:14px;">
                        <svg width="20" height="20" viewBox="0 0 48 48">
                            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                            <path fill="none" d="M0 0h48v48H0z"/>
                        </svg>
                        Continue with Google
                    </button>
                </div>
            </div>

            <!-- ── STAFF APPLICATION FORM ── -->
            <div id="staff-join-form" style="display:none;">
                <form class="auth-form" id="actual-staff-form" novalidate>
                    <div class="form-group">
                        <label class="form-label">Full Name</label>
                        <input type="text" id="staff-name" class="form-input" placeholder="Your full name" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <input type="email" id="staff-email" class="form-input" placeholder="name@example.com" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Role</label>
                        <select id="staff-role" class="form-input" required style="background:rgba(255,255,255,0.03);cursor:pointer;color:#ccc;">
                            <option value="" disabled selected>Select your expertise</option>
                            <option value="Inventory Manager">Inventory Manager</option>
                            <option value="Order Processing">Order Processing</option>
                            <option value="Customer Support">Customer Support</option>
                            <option value="Social Media">Social Media</option>
                            <option value="Design">Design</option>
                        </select>
                    </div>
                    <button type="submit" class="auth-btn">Submit Application</button>
                    <div class="admin-toggle">
                        <a class="admin-link" onclick="toggleStaffForm(false)">← Back to Join</a>
                    </div>
                </form>
            </div>

        </div><!-- /auth-container -->
    </main>

    <!-- Toast -->
    <div class="auth-toast" id="zs-auth-toast"></div>

    <!-- Firebase Config + DB Layer -->
    <script src="/js/firebase-config.js"></script>
    <script src="/js/db.js"></script>

    <script>
    // ═══════════════════════════════════════════════════════════════════
    // ACCOUNT PAGE CONTROLLER
    // ═══════════════════════════════════════════════════════════════════
    (function() {
        'use strict';

        // ── Init CSRF ──
        const csrfToken = window.zsSecurity.generateCSRFToken();

        // ── Redirect if already logged in ──
        const urlParams = new URLSearchParams(window.location.search);
        const isResetFlow = urlParams.has('reset') && urlParams.has('uid');

        const currentUser = (() => {
            try { return JSON.parse(localStorage.getItem('zs_user')); } catch(e) { return null; }
        })();

        if (currentUser && currentUser.isLoggedIn && !isResetFlow) {
            window.location.href = 'dashboard';
            return;
        }

        // ── DOM refs ──
        const loginFormEl    = document.getElementById('login-form');
        const joinFormEl     = document.getElementById('join-form');
        const staffFormEl    = document.getElementById('staff-join-form');
        const titleEl        = document.getElementById('auth-title');
        const subtitleEl     = document.getElementById('auth-subtitle');
        const tabLogin       = document.getElementById('tab-login');
        const tabJoin        = document.getElementById('tab-join');
        const authTabs       = document.getElementById('auth-tabs');
        const socialBlock    = document.getElementById('social-block');

        // ── Toast helper ──
        function showToast(msg, isError = true) {
            const toast = document.getElementById('zs-auth-toast');
            toast.textContent = msg;
            toast.className = `auth-toast show ${isError ? 'error' : 'success'}`;
            clearTimeout(toast._timer);
            toast._timer = setTimeout(() => toast.classList.remove('show'), 4500);
        }

        window.showToast = showToast;

        // ── Tab switch ──
        window.toggleAuth = function(type) {
            if (type === 'login') {
                loginFormEl.style.display = '';
                joinFormEl.style.display  = 'none';
                staffFormEl.style.display = 'none';
                tabLogin.classList.add('active');
                tabJoin.classList.remove('active');
                titleEl.textContent    = window.isAdminView ? 'ADMIN TERMINAL' : 'ACCESS GRANTED';
                subtitleEl.textContent = window.isAdminView ? 'Secure Staff Override Active' : 'Welcome to the Zaylore Syndicate';
            } else {
                loginFormEl.style.display = 'none';
                joinFormEl.style.display  = '';
                staffFormEl.style.display = 'none';
                tabJoin.classList.add('active');
                tabLogin.classList.remove('active');
                titleEl.textContent    = 'JOIN THE MOVEMENT';
                subtitleEl.textContent = 'Create your Zaylore account';
            }
        };

        window.toggleStaffForm = function(show) {
            if (show) {
                joinFormEl.style.display  = 'none';
                staffFormEl.style.display = '';
                titleEl.textContent = 'STAFF APPLICATION';
                subtitleEl.textContent = 'Apply to join the Zaylore team';
            } else {
                joinFormEl.style.display  = '';
                staffFormEl.style.display = 'none';
                titleEl.textContent = 'JOIN THE MOVEMENT';
                subtitleEl.textContent = 'Create your Zaylore account';
            }
        };

        // ── Admin toggle ──
        window.isAdminView = false;
        window.toggleAdmin = function() {
            window.isAdminView = !window.isAdminView;
            const userLabel  = document.getElementById('user-label');
            const userInput  = document.getElementById('user-input');
            const adminBtn   = document.getElementById('admin-btn');
            const adminText  = document.getElementById('admin-text');
            const authSubmit = document.getElementById('auth-submit-btn');
            const socialBlk  = document.getElementById('social-block');

            if (window.isAdminView) {
                titleEl.textContent    = 'ADMIN TERMINAL';
                subtitleEl.textContent = 'Secure Staff Override Active';
                userInput.type         = 'text';
                userLabel.textContent  = 'Admin Username';
                userInput.placeholder  = 'Enter staff ID';
                adminBtn.textContent   = 'User Login';
                adminText.textContent  = 'Not staff?';
                authSubmit.textContent = 'BYPASS';
                if (socialBlk) socialBlk.style.display = 'none';
            } else {
                titleEl.textContent    = 'ACCESS GRANTED';
                subtitleEl.textContent = 'Welcome to the Zaylore Syndicate';
                userInput.type         = 'email';
                userLabel.textContent  = 'Email Address';
                userInput.placeholder  = 'name@example.com';
                adminBtn.textContent   = 'Admin Login';
                adminText.textContent  = 'Staff member?';
                authSubmit.textContent = 'AUTHORIZE';
                if (socialBlk) socialBlk.style.display = '';
            }
        };

        // ── Password show/hide ──
        function setupPassToggle(btnId, inputId) {
            const btn = document.getElementById(btnId);
            const inp = document.getElementById(inputId);
            if (!btn || !inp) return;
            btn.addEventListener('click', () => {
                const isPass = inp.type === 'password';
                inp.type = isPass ? 'text' : 'password';
                btn.innerHTML = isPass
                    ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`
                    : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
            });
        }
        setupPassToggle('pass-toggle-login', 'pass-input');
        setupPassToggle('pass-toggle-join',  'join-password');

        // ── Password strength meter ──
        const passInput = document.getElementById('join-password');
        if (passInput) {
            passInput.addEventListener('input', () => {
                const val = passInput.value;
                let strength = 0;
                if (val.length >= 8) strength++;
                if (/[A-Z]/.test(val)) strength++;
                if (/[0-9]/.test(val)) strength++;
                if (/[^A-Za-z0-9]/.test(val)) strength++;

                const bars   = ['sb1','sb2','sb3','sb4'];
                const labels = ['','Weak','Fair','Strong','Very Strong'];
                const classes= ['','weak','medium','strong','strong'];

                bars.forEach((id, i) => {
                    const el = document.getElementById(id);
                    el.className = 'strength-bar' + (i < strength ? ' ' + classes[strength] : '');
                });
                document.getElementById('pass-strength-label').textContent = labels[strength];
            });
        }

        // ── LOGIN SUBMIT ──
        const actualLoginForm = document.getElementById('actual-login-form');
        if (actualLoginForm) {
            actualLoginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const emailInput = document.getElementById('user-input');
                const passInput  = document.getElementById('pass-input');
                const submitBtn  = document.getElementById('auth-submit-btn');

                const email    = emailInput.value.trim();
                const password = passInput.value;

                if (!email || !password) {
                    showToast('Please fill in all fields.', true);
                    return;
                }

                try {
                    submitBtn.disabled   = true;
                    submitBtn.textContent = 'AUTHENTICATING...';

                    if (window.isAdminView) {
                        // Admin login (hardcoded for security separation)
                        if (email.toLowerCase() === 'waaiz' && password === 'zaylore_founder') {
                            localStorage.setItem('adminRole', 'founder');
                            localStorage.setItem('adminName', 'PM Mohammed Waaiz');
                            showToast('Access Granted. Launching Founder Command Center...', false);
                            setTimeout(() => window.location.href = 'admin', 1200);
                        } else if (email.toLowerCase() === 'staff' && password === 'zaylore_staff') {
                            localStorage.setItem('adminRole', 'staff');
                            localStorage.setItem('adminName', 'Zaylore Staff');
                            showToast('Access Granted. Launching Operations Console...', false);
                            setTimeout(() => window.location.href = 'admin', 1200);
                        } else {
                            // Check approved staff
                            const approved = JSON.parse(localStorage.getItem('staffRequestsApproved') || '[]');
                            const match = approved.find(s => s.username === email.toLowerCase() && s.password === password);
                            if (match) {
                                localStorage.setItem('adminRole', 'staff');
                                localStorage.setItem('adminName', match.name);
                                showToast(`Welcome ${match.name}. Access Authorized.`, false);
                                setTimeout(() => window.location.href = 'admin', 1200);
                            } else {
                                throw new Error('Invalid staff credentials. Override rejected.');
                            }
                        }
                    } else {
                        // Customer login
                        const user = await window.ZayloreDB.login(email, password);
                        saveSession(user);
                        showToast('Authentication Successful. Entering Syndicate...', false);
                        setTimeout(() => window.location.href = 'dashboard', 1000);
                    }
                } catch (err) {
                    showToast(err.message, true);
                    submitBtn.disabled   = false;
                    submitBtn.textContent = window.isAdminView ? 'BYPASS' : 'AUTHORIZE';
                }
            });
        }

        // ── JOIN SUBMIT ──
        const actualJoinForm = document.getElementById('actual-join-form');
        if (actualJoinForm) {
            actualJoinForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const name     = document.getElementById('join-name').value.trim();
                const email    = document.getElementById('join-email').value.trim();
                const password = document.getElementById('join-password').value;
                const submitBtn = actualJoinForm.querySelector('button[type="submit"]');

                if (!name || !email || !password) {
                    showToast('Please fill in all fields.', true);
                    return;
                }
                if (password.length < 6) {
                    showToast('Password must be at least 6 characters.', true);
                    return;
                }

                try {
                    submitBtn.disabled   = true;
                    submitBtn.textContent = 'INITIALIZING...';

                    const user = await window.ZayloreDB.signup(name, email, password);
                    saveSession(user);
                    showToast('Account Created. Welcome to the Zaylore Syndicate!', false);
                    setTimeout(() => window.location.href = 'dashboard', 1200);
                } catch (err) {
                    showToast(err.message, true);
                    submitBtn.disabled   = false;
                    submitBtn.textContent = 'INITIALIZE ACCOUNT';
                }
            });
        }

        // ── STAFF FORM SUBMIT ──
        const staffForm = document.getElementById('actual-staff-form');
        if (staffForm) {
            staffForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const name  = document.getElementById('staff-name').value.trim();
                const email = document.getElementById('staff-email').value.trim();
                const role  = document.getElementById('staff-role').value;
                const btn   = staffForm.querySelector('button[type="submit"]');

                try {
                    btn.disabled   = true;
                    btn.textContent = 'TRANSMITTING...';
                    await window.ZayloreDB.submitStaffApplication({ name, email, role });
                    showToast('Application Submitted! You will receive credentials upon approval.', false);
                    setTimeout(() => { toggleStaffForm(false); toggleAuth('login'); }, 2000);
                } catch (err) {
                    showToast(err.message, true);
                    btn.disabled   = false;
                    btn.textContent = 'SUBMIT APPLICATION';
                }
            });
        }

        // ── GOOGLE SIGN-IN ──
        window.handleGoogleSignIn = async function() {
            try {
                const user = await window.ZayloreDB.loginWithGoogle();
                saveSession(user);
                showToast('Connected via Google. Entering Syndicate...', false);
                setTimeout(() => window.location.href = 'dashboard', 1000);
            } catch (err) {
                showToast(err.message || 'Google Sign-In failed. Try email/password.', true);
            }
        };

        // ── FORGOT PASSWORD ──
        const forgotLink = document.getElementById('forgot-link');
        if (forgotLink) {
            forgotLink.addEventListener('click', async (e) => {
                e.preventDefault();
                const email = document.getElementById('user-input').value.trim();
                if (!email) {
                    showToast('Enter your email first, then click Forgot Password.', true);
                    return;
                }
                try {
                    forgotLink.textContent = 'Sending...';
                    await window.ZayloreDB.resetPasswordRequest(email);
                    showToast('Password reset email sent! Check your inbox.', false);
                } catch (err) {
                    showToast(err.message, true);
                } finally {
                    forgotLink.textContent = 'Forgot password?';
                }
            });
        }

        // ── Save session helper ──
        function saveSession(user) {
            localStorage.setItem('zs_user', JSON.stringify({
                isLoggedIn:  true,
                uid:         user.uid,
                name:        user.name || '',
                email:       user.email || '',
                tier:        user.tier || 'CORE MEMBER',
                phone:       user.phone || '',
                gender:      user.gender || '',
                dob:         user.dob || '',
                profilePic:  user.profilePic || '',
                referralCode:user.referralCode || ''
            }));
        }

        // ── Reset password flow from URL ──
        if (isResetFlow) {
            const uid = urlParams.get('uid');
            authTabs.style.display   = 'none';
            loginFormEl.style.display = 'none';
            if (document.getElementById('social-block'))
                document.getElementById('social-block').style.display = 'none';
            titleEl.textContent    = 'RESET PASSWORD';
            subtitleEl.textContent = 'Reinitialize your security credentials';

            const resetDiv = document.createElement('div');
            resetDiv.innerHTML = `
                <form class="auth-form" id="actual-reset-form">
                    <div class="form-group">
                        <label class="form-label">New Password</label>
                        <input type="password" id="reset-pass" class="form-input" placeholder="••••••••" minlength="6" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Confirm Password</label>
                        <input type="password" id="reset-pass-confirm" class="form-input" placeholder="••••••••" minlength="6" required>
                    </div>
                    <button type="submit" class="auth-btn">UPDATE SECURITY</button>
                    <div class="admin-toggle"><a class="admin-link" onclick="location.href='account'">Cancel Reset</a></div>
                </form>`;
            document.getElementById('auth-container').insertBefore(resetDiv, document.getElementById('zs-auth-toast'));

            document.getElementById('actual-reset-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const pass    = document.getElementById('reset-pass').value;
                const confirm = document.getElementById('reset-pass-confirm').value;
                const btn     = e.target.querySelector('button[type="submit"]');

                if (pass !== confirm) { showToast('Passwords do not match.', true); return; }
                try {
                    btn.disabled = true; btn.textContent = 'UPDATING...';
                    await window.ZayloreDB.completeResetPassword(uid, pass);
                    showToast('Password updated. Please sign in.', false);
                    setTimeout(() => { history.replaceState({}, '', 'account'); location.reload(); }, 1800);
                } catch (err) {
                    showToast(err.message, true);
                    btn.disabled = false; btn.textContent = 'UPDATE SECURITY';
                }
            });
        }

    })();
    </script>

    <!-- Nav + global script -->
    <script defer src="/js/auth-state.js"></script>
    <script defer src="/script.min.js?v=1.2.0"></script>
</body>
</html>
